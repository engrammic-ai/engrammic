# src/context_service/config/mcp_tools.yaml
# MCP Tool Surface Configuration
# Schema: CITE v2 (5 nodes: Memory, Claim, Fact, Belief, Commitment;
#                   6 edges: DERIVED_FROM, SYNTHESIZED_FROM, SUPERSEDES, SUPPORTS, CONTRADICTS, ABOUT)

mcp_instructions: |
  Engrammic: Epistemic memory for AI agents.

  Quick start:
  - remember: store observations (writes Memory nodes)
  - learn: record claims WITH evidence (writes Claim nodes)
  - recall: search your knowledge
  - trace: understand provenance (walks DERIVED_FROM / SYNTHESIZED_FROM chains)
  - tick: lightweight engagement check

  Always recall before you store, and at the start of a task.

  Supersession pattern (important):
  Before storing, recall to check if you're updating existing knowledge.
  If found, pass supersedes:<node_id> to chain the update.

  Example:
    1. recall("API authentication method")
    2. Found node abc123: "The API uses OAuth2"
    3. learn("The API uses OAuth2 with PKCE", evidence=[...], supersedes="abc123")

  This creates a version chain - old node stays for history, new node becomes current.
  Use trace(node_id) to walk the full provenance chain. If you skip recall, duplicates
  may exist (Custodian catches these later, but explicit is better).

  Guidelines:
  - Always provide evidence when using learn
  - Hint source_tier on learn when you know the source quality
    (authoritative for .gov/.edu, validated for curated data)
  - Recall before storing to check for supersession opportunities

  Wisdom nodes (Belief, Commitment) are system-synthesized or agent-declared;
  agents do not write them directly via tool arguments.

tools:
  remember:
    description: |
      Store an observation to memory. Writes a Memory node. Returns immediately;
      node becomes searchable within ~500ms (async embedding). For immediate
      recall, use the returned node_id with recall(node_ids=[...]). No evidence
      required. Consider recall first - if updating existing knowledge, pass
      supersedes:<node_id>.
    maps_to: Memory

  learn:
    description: |
      Record a claim with evidence. Writes a Claim node. Returns immediately;
      node becomes searchable within ~500ms (async embedding). Recall first
      to check for existing claims - pass supersedes:<node_id> to update.
      Optionally hint source_tier.
    maps_to: Claim

  recall:
    description: |
      Search or fetch knowledge. Call this at the START of any task and
      before storing anything (to supersede, not duplicate). Use query for
      semantic search, node_ids for direct fetch, query="*" to list all.
      Low-confidence and unresolved-contradiction nodes are withheld by
      default and reported as a withheld count; pass include_withheld=true
      to see them. min_threshold overrides the relevance cutoff (0.0-1.0).

      Fusion mode: Set fusion_mode=true to run semantic and graph retrieval
      in parallel, fusing results with Reciprocal Rank Fusion (RRF). Requires
      a query. Returns fusion_meta with rrf_score per node.

      Temporal filtering (fusion_mode only): Use since="7d" or until="2024-01-01"
      to filter by node creation time. Requires fusion_mode=True. Accepts
      relative ("7d", "1w", "30d") or ISO datetime.

      Hints: Set include_hints=true to receive belief candidate suggestions
      when corroborating facts are detected.
    maps_to: retrieve

  trace:
    description: |
      Trace provenance or impact of a node. direction="up" (default) walks
      backward to sources (why I believe this). direction="down" walks forward
      to derived nodes (what depends on this). max_depth controls traversal
      depth (default 5). edge_types filters to specific edges: DERIVED_FROM,
      PROMOTED_FROM, SYNTHESIZED_FROM, REFERENCES.
    maps_to: provenance

  forget:
    description: |
      Request deletion of a node. The node is tombstoned and enters a cancel
      window before permanent deletion. Use for GDPR erasure or removing
      incorrect data. Pass cascade=true to also tombstone downstream nodes
      that reference this one.
    maps_to: forget

  tick:
    description: |
      Lightweight engagement check. Returns pending markers without a full
      recall. Safe to call frequently; zero side effects. Optionally scope
      to specific node IDs via about_hint.
    maps_to: engagement

  update:
    description: |
      Update existing knowledge by superseding it with new content. Provide
      either target (explicit node_id, skips search) or query (semantic search
      to find the node to replace). If query matches exactly one node above the
      similarity threshold (0.7), it is auto-superseded. If multiple matches are
      found, returns {status: "ambiguous", candidates: [...]} for the caller to
      resolve. If no match is found, returns {status: "not_found"}. Requires
      evidence. Use learn() to create new knowledge without supersession.
    maps_to: Claim

