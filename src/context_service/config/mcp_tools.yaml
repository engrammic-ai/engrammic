# src/context_service/config/mcp_tools.yaml
# MCP Tool Surface Configuration
# Schema: CITE v2 (5 nodes: Memory, Claim, Fact, Belief, Commitment;
#                   6 edges: DERIVED_FROM, SYNTHESIZED_FROM, SUPERSEDES, SUPPORTS, CONTRADICTS, ABOUT)

mcp_instructions: |
  Engrammic: Epistemic memory for AI agents.

  Quick start:
  - remember: store observations (writes Memory nodes)
  - learn: record claims WITH evidence (writes Claim nodes)
  - recall: search your knowledge
  - trace: understand provenance (walks DERIVED_FROM / SYNTHESIZED_FROM chains)
  - tick: lightweight engagement check

  Always recall before you store, and at the start of a task.

  Supersession pattern (important):
  Before storing, recall to check if you're updating existing knowledge.
  If found, pass supersedes:<node_id> to chain the update.

  Example:
    1. recall("API authentication method")
    2. Found node abc123: "The API uses OAuth2"
    3. learn("The API uses OAuth2 with PKCE", evidence=[...], supersedes="abc123")

  This creates a version chain - old node stays for history, new node becomes current.
  Use trace(node_id) to walk the full provenance chain. If you skip recall, duplicates
  may exist (Custodian catches these later, but explicit is better).

  Guidelines:
  - Always provide evidence when using learn
  - Hint source_tier on learn when you know the source quality
    (authoritative for .gov/.edu, validated for curated data)
  - Recall before storing to check for supersession opportunities

  Wisdom nodes (Belief, Commitment) are system-synthesized or agent-declared;
  agents do not write them directly via tool arguments.

tools:
  remember:
    description: |
      Store an observation to memory. Writes a Memory node. Returns immediately;
      node becomes searchable within ~500ms (async embedding). For immediate
      recall, use the returned node_id with recall(node_ids=[...]). No evidence
      required. Consider recall first - if updating existing knowledge, pass
      supersedes:<node_id>.

      For reflections (metacognitive observations about other nodes), pass
      memory_type="reflection" and about=[node_ids]. Reflections don't decay
      and create ABOUT edges to the referenced nodes. Example:
      remember("I was wrong about X because Y", memory_type="reflection", about=["node_123"])

      For long content (>200 chars), pass summary with a 1-sentence key fact to
      improve semantic search precision. The summary is embedded instead of the
      full content, producing a tighter embedding that recalls more accurately.
      Example: remember("...[long observation]...", summary="User prefers async patterns over callbacks")
    params:
      summary:
        type: string
        maxLength: 128
        description: "Key fact for semantic search (recommended for long content >200 chars)"
    maps_to: Memory

  learn:
    description: |
      Record a claim with evidence. Writes a Claim node. Returns immediately;
      node becomes searchable within ~500ms (async embedding). Recall first
      to check for existing claims - pass supersedes:<node_id> to update.
      Optionally hint source_tier.
    params:
      source_content:
        type: string
        maxLength: 4096
        description: |
          Full text the claim is derived from. Required for auth-gated sources.
          SAGE verifies claim against this content. Deleted after Claim->Fact promotion.
          Example: If claiming "API uses OAuth2", paste the relevant docs section.
    maps_to: Claim

  recall:
    description: |
      Search or fetch knowledge. Call this at the START of any task and
      before storing anything (to supersede, not duplicate). Use query for
      semantic search, node_ids for direct fetch, query="*" to list all.
      Low-confidence and unresolved-contradiction nodes are withheld by
      default and reported as a withheld count; pass include_withheld=true
      to see them. min_threshold overrides the relevance cutoff (0.0-1.0).

      Fusion mode: Set fusion_mode=true to run semantic and graph retrieval
      in parallel, fusing results with Reciprocal Rank Fusion (RRF). Requires
      a query. Returns fusion_meta with rrf_score per node.

      Temporal filtering (fusion_mode only): Use since="7d" or until="2024-01-01"
      to filter by node creation time. Requires fusion_mode=True. Accepts
      relative ("7d", "1w", "30d") or ISO datetime.

      Time-travel: Use as_of="2024-06-01T12:00:00Z" to query epistemic state
      at a historical point. Returns nodes valid at that time, excluding
      nodes created after or superseded before the timestamp.

      Hints: Set include_hints=true to receive belief candidate suggestions
      when corroborating facts are detected.

      Tags: Pass tags=["foo", "bar"] to filter to nodes with ALL specified tags.
    maps_to: retrieve

  trace:
    description: |
      Trace provenance or impact of a node. direction="up" (default) walks
      backward to sources (why I believe this). direction="down" walks forward
      to derived nodes (what depends on this). max_depth controls traversal
      depth (default 5). edge_types filters to specific edges: DERIVED_FROM,
      PROMOTED_FROM, SYNTHESIZED_FROM, REFERENCES.
    maps_to: provenance

  reason:
    description: |
      Create ephemeral reasoning chain for multi-step inference (Intelligence layer).
      Pass steps as [{step: 1, reasoning: "...", confidence: 0.9}, ...].
      Optionally provide conclusion, evidence_used (node IDs), and crystallizations
      to commit beliefs from the reasoning. Chains are session-scoped by default.
      Use parent_chain_id to continue a previous chain.
    maps_to: intelligence

  forget:
    description: |
      Request deletion of a node. The node is tombstoned and enters a cancel
      window before permanent deletion. Use for GDPR erasure or removing
      incorrect data. Pass cascade=true to also tombstone downstream nodes
      that reference this one.
    maps_to: forget

  tick:
    description: |
      Lightweight engagement check. Returns pending markers without a full
      recall. Safe to call frequently; zero side effects. Optionally scope
      to specific node IDs via about_hint.
    maps_to: engagement

  update:
    description: |
      Update existing knowledge by superseding it with new content. Provide
      either target (explicit node_id, skips search) or query (semantic search
      to find the node to replace). Arguments: content (the new claim text),
      evidence (list of URIs/node refs), target or query. If query matches
      exactly one node above the similarity threshold (0.7), it is auto-superseded.
      If multiple matches are found, returns {status: "ambiguous", candidates: [...]}
      for the caller to resolve. If no match is found, returns {status: "not_found"}.
      Use learn() to create new knowledge without supersession.
    maps_to: Claim

  agents:
    description: |
      List agents registered in the silo. Returns agent_id, role, first_seen,
      last_seen, node_count (nodes written by this agent), and trust_score.
      Useful for multi-agent coordination and auditing which agents have
      contributed to the knowledge base. silo_id defaults to the org's
      primary silo derived from auth.
    maps_to: agents

  introspect:
    description: |
      Query metacognitive state of the knowledge graph. Use for understanding
      epistemic health and agent contributions.

      query_type options:
      - volatility: Find topics with high supersession churn (unstable knowledge)
      - gaps: Find frequently-asked but unanswered queries (known unknowns)
      - provenance: Trace which agents contributed to a belief (requires node_id)
      - contributions: Get contribution stats for an agent (defaults to self)

      Example: introspect(query_type="gaps", min_threshold=3) returns queries
      asked 3+ times that returned no results.
    maps_to: introspect

  conflicts:
    description: |
      List contradictions between nodes. Returns CONTRADICTS edges with both
      node contents and agent attributions. Filter by status (default: unresolved)
      or by agent_id to see conflicts involving a specific agent.
    maps_to: conflicts

  dismiss_conflict:
    description: |
      Mark a conflict as not-a-real-conflict. Use when nodes don't actually
      contradict (different contexts, complementary facts, etc.). Records
      reason for audit trail.
    maps_to: conflicts

  escalate_conflict:
    description: |
      Flag a conflict for human review. Use when agent cannot determine which
      node is correct or when domain expertise is needed. Records message
      for the reviewer.
    maps_to: conflicts

  resolve_conflict:
    description: |
      Pick a winner for a conflict. By default (supersede=true), the loser
      node is marked superseded by the winner. Pass supersede=false to mark
      resolved without supersession chain.
    maps_to: conflicts

