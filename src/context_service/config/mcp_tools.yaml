# src/context_service/config/mcp_tools.yaml
# MCP Tool Surface Configuration
# Edit this file to change tool names, descriptions, and profiles without code changes.

mcp_instructions: |
  Engrammic: Epistemic memory for AI agents.

  Quick start:
  - remember: store observations
  - learn: record claims WITH evidence
  - believe: declare conclusions
  - recall: search your knowledge
  - trace: understand why you believe something
  - link: connect related knowledge

  Supersession pattern (important):
  Before storing, recall to check if you're updating existing knowledge.
  If found, pass supersedes:<node_id> to chain the update.

  Example:
    1. recall("API authentication method")
    2. Found node abc123: "The API uses OAuth2"
    3. learn("The API uses OAuth2 with PKCE", evidence=[...], supersedes="abc123")

  This creates a version chain - old node stays for history, new node becomes current.
  If you skip recall, duplicates may exist (Custodian catches these later, but explicit is better).

  Guidelines:
  - Always provide evidence when using learn
  - Hint source_tier on learn when you know the source quality (authoritative for .gov/.edu, validated for curated data)
  - Reference existing nodes when forming beliefs
  - Recall before storing to check for supersession opportunities

  Onboarding:
  - At session start, call patterns(action='get', name='onboarding') for your workflow guide

default_profile: reasoning

profiles:
  standard:
    - remember
    - learn
    - believe
    - recall
    - trace
    - link

  reasoning:
    - remember
    - learn
    - believe
    - reason
    - reflect
    - recall
    - trace
    - link
    - hypothesize
    - revise
    - commit
    - forget

tools:
  remember:
    description: "Store an observation. No evidence required. Consider recall first - if updating existing knowledge, pass supersedes:<node_id>."
    maps_to: memory

  learn:
    description: "Record a claim with evidence. Recall first to check for existing claims - pass supersedes:<node_id> to update. Optionally hint source_tier."
    maps_to: knowledge

  believe:
    description: "Declare a commitment. Requires 'about' nodes. Recall first - pass supersedes:<node_id> if updating a prior belief."
    maps_to: wisdom

  recall:
    description: "Retrieve knowledge. Search by query or fetch by node_id."
    maps_to: recall

  trace:
    description: "Trace the provenance of a belief back to its sources."
    maps_to: provenance

  link:
    description: "Create a typed relationship between nodes."
    maps_to: link

  reason:
    description: "Record explicit reasoning steps for complex problems."
    maps_to: intelligence

  reflect:
    description: "Record a meta-observation about your knowledge."
    maps_to: meta

  hypothesize:
    description: "Form a tentative belief during reasoning. Use commit to finalize."
    maps_to: belief

  revise:
    description: "Update a tentative hypothesis when new information arrives."
    maps_to: update_belief

  commit:
    description: "Promote tentative hypotheses to permanent commitments."
    maps_to: crystallize

  forget:
    description: "Request deletion of a node. The node enters a cancel window before permanent deletion."
    maps_to: forget

  patterns:
    description: "Discover workflow templates for common tasks."
    maps_to: skills
    always_available: true
