steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from=${_IMAGE}:latest'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '-f'
      - 'docker/Dockerfile.dagster'
      - '-t'
      - '${_IMAGE}:latest'
      - '-t'
      - '${_IMAGE}:${SHORT_SHA}'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

images:
  - '${_IMAGE}:latest'
  - '${_IMAGE}:${SHORT_SHA}'

substitutions:
  _IMAGE: 'europe-north1-docker.pkg.dev/engrammic/engrammic/engrammic-dagster'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

serviceAccount: 'projects/engrammic/serviceAccounts/cloudbuild-dev@engrammic.iam.gserviceaccount.com'
