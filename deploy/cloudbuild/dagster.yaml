steps:
  # Set up buildx for registry caching
  - name: 'gcr.io/cloud-builders/docker'
    args: ['buildx', 'create', '--use', '--name', 'cloudbuild']

  # Build with registry caching (mode=max caches all layers including builder stage)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'buildx'
      - 'build'
      - '--cache-from=type=registry,ref=${_IMAGE}:buildcache'
      - '--cache-to=type=registry,ref=${_IMAGE}:buildcache,mode=max'
      - '--push'
      - '-f'
      - 'docker/Dockerfile.dagster'
      - '-t'
      - '${_IMAGE}:latest'
      - '-t'
      - '${_IMAGE}:${SHORT_SHA}'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

substitutions:
  _IMAGE: 'europe-north1-docker.pkg.dev/engrammic/engrammic/engrammic-dagster'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
timeout: 1200s

serviceAccount: 'projects/engrammic/serviceAccounts/cloudbuild-dev@engrammic.iam.gserviceaccount.com'
