<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" fill="none" stroke="#000" stroke-width="1.5">
  <!-- Input blocks (left side) -->
  <g id="inputs">
    <!-- Documents -->
    <g id="docs">
      <path d="M30 100 L70 120 L110 100 L70 80 Z" />
      <path d="M30 100 L30 120 L70 140 L70 120 Z" />
      <path d="M70 120 L70 140 L110 120 L110 100 Z" />
    </g>
    <!-- Conversations -->
    <g id="convos">
      <path d="M30 180 L70 200 L110 180 L70 160 Z" />
      <path d="M30 180 L30 200 L70 220 L70 200 Z" />
      <path d="M70 200 L70 220 L110 200 L110 180 Z" />
    </g>
    <!-- Actions -->
    <g id="actions">
      <path d="M30 260 L70 280 L110 260 L70 240 Z" />
      <path d="M30 260 L30 280 L70 300 L70 280 Z" />
      <path d="M70 280 L70 300 L110 280 L110 260 Z" />
    </g>
  </g>

  <!-- Input labels -->
  <g font-family="sans-serif" font-size="10" fill="#000" stroke="none" text-anchor="middle">
    <text x="70" y="65">Documents</text>
    <text x="70" y="145">Conversations</text>
    <text x="70" y="225">Actions</text>
  </g>

  <!-- Center: 2x2 grid on base platform -->
  <g id="stack" transform="translate(250, 30)">
    <!-- Base platform -->
    <path d="M0 280 L100 330 L200 280 L100 230 Z" />
    <path d="M0 280 L0 300 L100 350 L100 330 Z" />
    <path d="M100 330 L100 350 L200 300 L200 280 Z" />

    <!-- Back-left: Memory -->
    <path d="M25 200 L75 230 L125 200 L75 170 Z" />
    <path d="M25 200 L25 220 L75 250 L75 230 Z" />
    <path d="M75 230 L75 250 L125 220 L125 200 Z" />

    <!-- Back-right: Knowledge -->
    <path d="M75 200 L125 230 L175 200 L125 170 Z" />
    <path d="M75 200 L75 220 L125 250 L125 230 Z" />
    <path d="M125 230 L125 250 L175 220 L175 200 Z" />

    <!-- Front-left: Wisdom -->
    <path d="M25 140 L75 170 L125 140 L75 110 Z" />
    <path d="M25 140 L25 160 L75 190 L75 170 Z" />
    <path d="M75 170 L75 190 L125 160 L125 140 Z" />

    <!-- Front-right: Intelligence -->
    <path d="M75 140 L125 170 L175 140 L125 110 Z" />
    <path d="M75 140 L75 160 L125 190 L125 170 Z" />
    <path d="M125 170 L125 190 L175 160 L175 140 Z" />
  </g>

  <!-- Stack labels -->
  <g font-family="sans-serif" font-size="9" fill="#000" stroke="none" text-anchor="middle">
    <text x="325" y="250">M</text>
    <text x="375" y="250">K</text>
    <text x="325" y="190">W</text>
    <text x="375" y="190">I</text>
    <text x="350" y="345" font-size="11">Company Context</text>
  </g>

  <!-- Consumer blocks (right side) -->
  <g id="consumers">
    <!-- Agent A -->
    <g id="agent-a">
      <path d="M560 120 L610 145 L660 120 L610 95 Z" />
      <path d="M560 120 L560 150 L610 175 L610 145 Z" />
      <path d="M610 145 L610 175 L660 150 L660 120 Z" />
    </g>
    <!-- Agent B -->
    <g id="agent-b">
      <path d="M560 230 L610 255 L660 230 L610 205 Z" />
      <path d="M560 230 L560 260 L610 285 L610 255 Z" />
      <path d="M610 255 L610 285 L660 260 L660 230 Z" />
    </g>
  </g>

  <!-- Consumer labels -->
  <g font-family="sans-serif" font-size="11" fill="#000" stroke="none" text-anchor="middle">
    <text x="610" y="80">Agent A</text>
    <text x="610" y="190">Agent B</text>
  </g>

  <!-- Connection wires -->
  <g stroke="#666" stroke-width="2" fill="none">
    <!-- Inputs to stack -->
    <path d="M110 110 Q 180 150 250 200" />
    <path d="M110 190 L250 220" />
    <path d="M110 270 Q 180 260 250 240" />

    <!-- Stack to consumers -->
    <path d="M450 180 Q 500 150 560 130" />
    <path d="M450 250 Q 500 250 560 245" />
  </g>
</svg>
