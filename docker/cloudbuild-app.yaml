steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGISTRY}/${_IMAGE}:latest'
      - '-t'
      - '${_REGISTRY}/${_IMAGE}:${SHORT_SHA}'
      - '-f'
      - 'docker/Dockerfile.${_DOCKERFILE}'
      - '--build-arg'
      - 'BASE_TAG=latest'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'
images:
  - '${_REGISTRY}/${_IMAGE}:latest'
  - '${_REGISTRY}/${_IMAGE}:${SHORT_SHA}'
options:
  machineType: 'E2_HIGHCPU_8'
