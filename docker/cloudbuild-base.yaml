steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGISTRY}/${_IMAGE}:latest'
      - '-t'
      - '${_REGISTRY}/${_IMAGE}:${COMMIT_SHA}'
      - '-f'
      - 'docker/Dockerfile.${_IMAGE}'
      - '.'
images:
  - '${_REGISTRY}/${_IMAGE}:latest'
  - '${_REGISTRY}/${_IMAGE}:${COMMIT_SHA}'
options:
  machineType: 'E2_HIGHCPU_8'
