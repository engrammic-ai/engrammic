steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGISTRY}/${_IMAGE}:latest'
      - '-f'
      - 'docker/Dockerfile.${_IMAGE}'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'
images:
  - '${_REGISTRY}/${_IMAGE}:latest'
options:
  machineType: 'E2_HIGHCPU_8'
