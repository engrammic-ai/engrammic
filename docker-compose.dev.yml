services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: engrammic-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOME=/home/engrammic
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_SERVICE_NAME=engrammic
      # LiteLLM Vertex AI (reranker, embeddings)
      - VERTEX_PROJECT=${VERTEX_PROJECT:-}
      - VERTEX_LOCATION=${VERTEX_LOCATION:-europe-north1}
    volumes:
      - ~/.config/gcloud:/mnt/gcloud:ro
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
    depends_on:
      memgraph:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph-mage:latest
    container_name: engrammic-memgraph
    ports:
      - "7687:7687"
      - "7444:7444"
    volumes:
      - memgraph-data:/var/lib/memgraph
      - memgraph-log:/var/log/memgraph
    environment:
      - MEMGRAPH_USER=${MEMGRAPH_USER:-}
      - MEMGRAPH_PASSWORD=${MEMGRAPH_PASSWORD:-}
    command: ["--log-level=WARNING", "--storage-properties-on-edges=true"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('localhost',7687)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  memgraph-test:
    image: memgraph/memgraph-mage:latest
    container_name: engrammic-memgraph-test
    ports:
      - "17687:7687"
    volumes:
      - memgraph-test-data:/var/lib/memgraph
    command: ["--log-level=WARNING", "--storage-properties-on-edges=true"]
    profiles:
      - test
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: engrammic-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: engrammic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: engrammic-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  memgraph-lab:
    image: memgraph/lab:latest
    container_name: engrammic-memgraph-lab
    ports:
      - "3001:3000"
    depends_on:
      - memgraph
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687
    restart: unless-stopped

  dagster-code-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.dagster
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: engrammic-dagster-code
    command: ["dagster", "api", "grpc", "-h", "0.0.0.0", "-p", "4000", "-m", "context_service.pipelines.definitions"]
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/app
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - HOME=/home/dagster
      - DAGSTER_POSTGRES_DB=engrammic_dagster
    volumes:
      - ./src:/app/src
      - ./docker/dagster.dev.yaml:/app/dagster.yaml:ro
      - ./config:/app/config:ro
      - ~/.config/gcloud:/mnt/gcloud:ro
    depends_on:
      - postgres
      - memgraph
      - qdrant
      - redis
    healthcheck:
      test: ["CMD", "dagster", "api", "grpc-health-check", "-p", "4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  dagster-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.dagster
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: engrammic-dagster-web
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "workspace.yaml"]
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/app
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - HOME=/home/dagster
      - DAGSTER_POSTGRES_DB=engrammic_dagster
    volumes:
      - ./src:/app/src
      - ./workspace.yaml:/app/workspace.yaml:ro
      - ./docker/dagster.dev.yaml:/app/dagster.yaml:ro
      - ./config:/app/config:ro
      - ~/.config/gcloud:/mnt/gcloud:ro
    depends_on:
      dagster-code-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dagster-daemon:
    build:
      context: .
      dockerfile: docker/Dockerfile.dagster
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: engrammic-dagster-daemon
    command: ["dagster-daemon", "run"]
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/app
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - HOME=/home/dagster
      - DAGSTER_POSTGRES_DB=engrammic_dagster
    volumes:
      - ./src:/app/src
      - ./workspace.yaml:/app/workspace.yaml:ro
      - ./docker/dagster.dev.yaml:/app/dagster.yaml:ro
      - ./config:/app/config:ro
      - ~/.config/gcloud:/mnt/gcloud:ro
    depends_on:
      postgres:
        condition: service_healthy
      dagster-code-server:
        condition: service_healthy
      memgraph:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # otel-collector disabled - use docker-compose.signoz.yml for observability
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:latest
  #   container_name: engrammic-otel
  #   ports:
  #     - "4317:4317"
  #     - "4318:4318"
  #   volumes:
  #     - ./config/otel-collector-dev.yaml:/etc/otelcol-contrib/config.yaml:ro
  #   command: ["--config=/etc/otelcol-contrib/config.yaml"]
  #   restart: unless-stopped

volumes:
  memgraph-data:
  memgraph-log:
  memgraph-test-data:
  qdrant-data:
  redis-data:
  postgres-data:
