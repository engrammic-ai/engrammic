services:
  app:
    build:
      context: ..
      dockerfile: context-service/Dockerfile
    container_name: context-service-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=context
      - POSTGRES_PASSWORD=context
      - POSTGRES_DATABASE=context_service
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gcp-sa.json
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=context-service
    volumes:
      - ./secrets:/app/secrets:ro
      - ./src:/app/src
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./config:/app/config:ro
    depends_on:
      memgraph:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph-mage:latest
    container_name: context-service-memgraph
    ports:
      - "7687:7687"
      - "7444:7444"
    volumes:
      - memgraph-data:/var/lib/memgraph
      - memgraph-log:/var/log/memgraph
    environment:
      - MEMGRAPH_USER=${MEMGRAPH_USER:-}
      - MEMGRAPH_PASSWORD=${MEMGRAPH_PASSWORD:-}
    command: ["--log-level=WARNING", "--storage-properties-on-edges=true"]
    healthcheck:
      test: ["CMD", "echo", ">", "/dev/tcp/localhost/7687"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  memgraph-test:
    image: memgraph/memgraph-mage:latest
    container_name: context-service-memgraph-test
    ports:
      - "17687:7687"
    volumes:
      - memgraph-test-data:/var/lib/memgraph
    command: ["--log-level=WARNING", "--storage-properties-on-edges=true"]
    profiles:
      - test
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: context-service-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: context-service-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: context-service-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=context
      - POSTGRES_PASSWORD=context
      - POSTGRES_DB=context_service
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U context -d context_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  memgraph-lab:
    image: memgraph/lab:latest
    container_name: context-service-memgraph-lab
    ports:
      - "3001:3000"
    depends_on:
      - memgraph
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687
    restart: unless-stopped

  dagster-webserver:
    build:
      context: ..
      dockerfile: context-service/Dockerfile.dagster
    container_name: context-service-dagster-web
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "workspace.yaml"]
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/app
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    volumes:
      - ./src:/app/src
      - ./workspace.yaml:/app/workspace.yaml:ro
      - ./config:/app/config:ro
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  dagster-daemon:
    build:
      context: ..
      dockerfile: context-service/Dockerfile.dagster
    container_name: context-service-dagster-daemon
    command: ["dagster-daemon", "run"]
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/app
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    volumes:
      - ./src:/app/src
      - ./workspace.yaml:/app/workspace.yaml:ro
      - ./config:/app/config:ro
    depends_on:
      - dagster-webserver
      - memgraph
      - qdrant
      - redis
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: context-service-otel
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      - SIGNOZ_ENDPOINT=${SIGNOZ_ENDPOINT:-signoz-otel-collector:4317}
    depends_on:
      - signoz-otel-collector
    restart: unless-stopped

  # SigNoz observability stack
  signoz-zookeeper:
    image: bitnami/zookeeper:3.7.1
    container_name: signoz-zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    volumes:
      - signoz-zookeeper-data:/bitnami/zookeeper
    restart: unless-stopped

  signoz-clickhouse:
    image: clickhouse/clickhouse-server:23.11.1-alpine
    container_name: signoz-clickhouse
    depends_on:
      - signoz-zookeeper
    volumes:
      - signoz-clickhouse-data:/var/lib/clickhouse/
    environment:
      - CLICKHOUSE_MAX_SERVER_MEMORY_USAGE_TO_RAM_RATIO=0.6
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:0.102.12
    container_name: signoz-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/signoz-otel-collector.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    restart: unless-stopped

  signoz-query-service:
    image: signoz/query-service:0.52.0
    container_name: signoz-query-service
    environment:
      - ClickHouseUrl=tcp://signoz-clickhouse:9000
      - STORAGE=clickhouse
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    restart: unless-stopped

  signoz-frontend:
    image: signoz/frontend:0.52.0
    container_name: signoz-frontend
    ports:
      - "3301:3301"
    depends_on:
      - signoz-query-service
    restart: unless-stopped

volumes:
  memgraph-data:
  memgraph-log:
  memgraph-test-data:
  qdrant-data:
  redis-data:
  postgres-data:
  signoz-zookeeper-data:
  signoz-clickhouse-data:
