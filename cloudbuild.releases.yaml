steps:
  # Pull existing images for cache (ignore failure if not exists)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_REGISTRY}/engrammic-api:latest || true']

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_REGISTRY}/engrammic-beacon:latest || true']

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_REGISTRY}/engrammic-dagster:latest || true']

  # Build API with BuildKit and cache-from
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '--cache-from=${_REGISTRY}/engrammic-api:latest'
      - '-f'
      - 'docker/Dockerfile.selfhosted.api'
      - '-t'
      - '${_REGISTRY}/engrammic-api:latest'
      - '-t'
      - '${_REGISTRY}/engrammic-api:v${_VERSION}'
      - '-t'
      - '${_REGISTRY}/engrammic-api:v${_VERSION}-${SHORT_SHA}'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

  # Build Beacon with BuildKit and cache-from
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '--cache-from=${_REGISTRY}/engrammic-beacon:latest'
      - '-f'
      - 'docker/Dockerfile.selfhosted.beacon'
      - '-t'
      - '${_REGISTRY}/engrammic-beacon:latest'
      - '-t'
      - '${_REGISTRY}/engrammic-beacon:v${_VERSION}'
      - '-t'
      - '${_REGISTRY}/engrammic-beacon:v${_VERSION}-${SHORT_SHA}'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

  # Build Dagster (SAGE pipelines) with BuildKit and cache-from
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '--cache-from=${_REGISTRY}/engrammic-dagster:latest'
      - '-f'
      - 'docker/Dockerfile.selfhosted.dagster'
      - '-t'
      - '${_REGISTRY}/engrammic-dagster:latest'
      - '-t'
      - '${_REGISTRY}/engrammic-dagster:v${_VERSION}'
      - '-t'
      - '${_REGISTRY}/engrammic-dagster:v${_VERSION}-${SHORT_SHA}'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

images:
  - '${_REGISTRY}/engrammic-api:latest'
  - '${_REGISTRY}/engrammic-api:v${_VERSION}'
  - '${_REGISTRY}/engrammic-api:v${_VERSION}-${SHORT_SHA}'
  - '${_REGISTRY}/engrammic-beacon:latest'
  - '${_REGISTRY}/engrammic-beacon:v${_VERSION}'
  - '${_REGISTRY}/engrammic-beacon:v${_VERSION}-${SHORT_SHA}'
  - '${_REGISTRY}/engrammic-dagster:latest'
  - '${_REGISTRY}/engrammic-dagster:v${_VERSION}'
  - '${_REGISTRY}/engrammic-dagster:v${_VERSION}-${SHORT_SHA}'

substitutions:
  _REGISTRY: 'europe-north1-docker.pkg.dev/engrammic/releases'
  _VERSION: ''

options:
  logging: CLOUD_LOGGING_ONLY
