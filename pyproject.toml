[project]
name = "context-service"
version = "0.1.0"
description = "Delta Prime context service - production backend"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }
authors = [{ name = "Delta Prime", email = "hello@deltaprime.dev" }]

dependencies = [
    # Primitives (submodule during dev, PyPI once stable)
    # "primitives @ file:../delta-prime/primitives",

    # Web
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "pydantic>=2.7",
    "pydantic-settings>=2.2",

    # Graph + Vector
    "neo4j>=5.19",  # Memgraph driver
    "qdrant-client>=1.9",

    # Embeddings
    "httpx>=0.27",  # For Jina/Vertex API calls

    # Pipelines
    "dagster>=1.7",
    "dagster-webserver>=1.7",

    # Observability
    "structlog>=24.1",
    "opentelemetry-api>=1.24",
    "opentelemetry-sdk>=1.24",

    # Auth (later)
    # "workos>=4.0",

    # Redis
    "redis>=5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "httpx>=0.27",  # For test client
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/context_service"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ARG"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
