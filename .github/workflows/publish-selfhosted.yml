name: Publish Self-Hosted Images

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.2.0)"
        required: true
        type: string

env:
  REGION: europe-north1
  PROJECT_ID: engrammic
  REGISTRY: europe-north1-docker.pkg.dev/engrammic/releases

jobs:
  build-selfhosted-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Extract from tag: refs/tags/v0.2.0 -> 0.2.0
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          IMAGE_BASE=${{ env.REGISTRY }}/engrammic-api
          VERSION=${{ steps.version.outputs.version }}
          SHORT_SHA=${{ env.SHORT_SHA }}

          docker build \
            -f docker/Dockerfile.selfhosted.api \
            -t "${IMAGE_BASE}:v${VERSION}" \
            -t "${IMAGE_BASE}:v${VERSION}-${SHORT_SHA}" \
            .

          docker push "${IMAGE_BASE}:v${VERSION}"
          docker push "${IMAGE_BASE}:v${VERSION}-${SHORT_SHA}"

  build-selfhosted-beacon:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: build-selfhosted-api
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Beacon image
        run: |
          IMAGE_BASE=${{ env.REGISTRY }}/engrammic-beacon
          VERSION=${{ needs.build-selfhosted-api.outputs.version }}
          SHORT_SHA=${{ env.SHORT_SHA }}

          docker build \
            -f docker/Dockerfile.selfhosted.beacon \
            -t "${IMAGE_BASE}:v${VERSION}" \
            -t "${IMAGE_BASE}:v${VERSION}-${SHORT_SHA}" \
            .

          docker push "${IMAGE_BASE}:v${VERSION}"
          docker push "${IMAGE_BASE}:v${VERSION}-${SHORT_SHA}"

  verify:
    needs: [build-selfhosted-api, build-selfhosted-beacon]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Pull images without auth to verify public access
        run: |
          VERSION=${{ needs.build-selfhosted-api.outputs.version }}
          docker pull ${{ env.REGISTRY }}/engrammic-api:v${VERSION}
          docker pull ${{ env.REGISTRY }}/engrammic-beacon:v${VERSION}
