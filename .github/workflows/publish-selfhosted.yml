name: Publish Self-Hosted Images

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.2.0)"
        required: true
        type: string

env:
  REGION: europe-north1
  PROJECT_ID: engrammic
  REGISTRY: europe-north1-docker.pkg.dev/engrammic/releases

jobs:
  build-selfhosted:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit to Cloud Build
        run: |
          gcloud builds submit \
            --config=docker/cloudbuild-selfhosted.yaml \
            --substitutions=_VERSION=v${{ steps.version.outputs.version }} \
            --timeout=3600s \
            .

  verify:
    needs: [build-selfhosted]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Pull images without auth to verify public access
        run: |
          VERSION=${{ needs.build-selfhosted.outputs.version }}
          docker pull ${{ env.REGISTRY }}/engrammic-api:v${VERSION}
          docker pull ${{ env.REGISTRY }}/engrammic-dagster:v${VERSION}

  create-standalone-bundles:
    needs: [build-selfhosted]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create bundles
        run: |
          VERSION=${{ needs.build-selfhosted.outputs.version }}

          for tier in lite standard pro; do
            mkdir -p standalone-${tier}

            # Copy compose file as docker-compose.yml
            cp docker/docker-compose.standalone-${tier}.yml standalone-${tier}/docker-compose.yml

            # Copy env example
            cp docker/standalone-${tier}.env.example standalone-${tier}/.env.example

            # Generate README
            cat > standalone-${tier}/README.md << EOF
          # Engrammic Standalone (${tier})

          Version: ${VERSION}

          ## Quick Start

          1. Copy .env.example to .env and add your license key:
             \`\`\`bash
             cp .env.example .env
             # Edit .env with your ENGRAMMIC_LICENSE_KEY
             \`\`\`

          2. Start the services:
             \`\`\`bash
             docker compose up -d
             \`\`\`

          3. Wait for models to download (first run only, check logs):
             \`\`\`bash
             docker compose logs -f ollama
             \`\`\`

          4. Verify health:
             \`\`\`bash
             curl http://localhost:8000/health
             \`\`\`

          ## Documentation

          See https://docs.engrammic.ai/selfhosted for full documentation.
          EOF

            tar -czf standalone-${tier}-v${VERSION}.tar.gz standalone-${tier}
          done

      - name: Upload bundles to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            standalone-lite-v*.tar.gz
            standalone-standard-v*.tar.gz
            standalone-pro-v*.tar.gz

      - name: Upload bundles as artifacts (for workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: standalone-bundles
          path: standalone-*-v*.tar.gz
