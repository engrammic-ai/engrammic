name: Deploy Beta

on:
  push:
    branches: [beta]
  workflow_dispatch:

env:
  REGION: europe-north1
  PROJECT_ID: engrammic

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build API image with Cloud Build
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-api:${{ github.sha }}
          gcloud builds submit --timeout 600s --config - <<EOF
          steps:
            - name: 'gcr.io/cloud-builders/docker'
              args: ['build', '-t', '$IMAGE', '-f', 'docker/Dockerfile.api', '.']
          images: ['$IMAGE']
          EOF
          gcloud artifacts docker tags add $IMAGE \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-api:latest

      - name: Build Beacon image with Cloud Build
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-beacon:${{ github.sha }}
          gcloud builds submit --timeout 300s --config - <<EOF
          steps:
            - name: 'gcr.io/cloud-builders/docker'
              args: ['build', '-t', '$IMAGE', '-f', 'docker/Dockerfile.beacon', '.']
          images: ['$IMAGE']
          EOF
          gcloud artifacts docker tags add $IMAGE \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-beacon:latest

      - name: Build Dagster image with Cloud Build
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-dagster:${{ github.sha }}
          gcloud builds submit --timeout 600s --config - <<EOF
          steps:
            - name: 'gcr.io/cloud-builders/docker'
              args: ['build', '-t', '$IMAGE', '-f', 'docker/Dockerfile.dagster', '.']
          images: ['$IMAGE']
          EOF
          gcloud artifacts docker tags add $IMAGE \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-dagster:latest

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy engrammic-beta-api \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-api:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --no-traffic

      - name: Run migrations via Cloud Run Job
        run: |
          gcloud run jobs execute engrammic-migrate-beta \
            --region ${{ env.REGION }} \
            --wait

      - name: Route traffic to new revision
        run: |
          gcloud run services update-traffic engrammic-beta-api \
            --region ${{ env.REGION }} \
            --to-latest
