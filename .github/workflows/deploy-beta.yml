name: Deploy Beta

on:
  push:
    branches: [beta]
  workflow_dispatch:

env:
  REGION: europe-north1
  PROJECT_ID: engrammic
  REGISTRY: europe-north1-docker.pkg.dev/engrammic/engrammic

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - image: engrammic-api
            dockerfile: api
          - image: engrammic-dagster
            dockerfile: dagster
          - image: engrammic-beacon
            dockerfile: beacon
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af

      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push ${{ matrix.image }}
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ matrix.image }}:latest \
            -t ${{ env.REGISTRY }}/${{ matrix.image }}:${GITHUB_SHA::7} \
            -f docker/Dockerfile.${{ matrix.dockerfile }} \
            --build-arg BASE_TAG=latest \
            .
          docker push ${{ env.REGISTRY }}/${{ matrix.image }}:latest
          docker push ${{ env.REGISTRY }}/${{ matrix.image }}:${GITHUB_SHA::7}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to VM
        run: |
          gcloud compute ssh engrammic-beta-stateful \
            --zone ${{ env.REGION }}-a \
            --tunnel-through-iap \
            --command "cd /opt/engrammic && sudo docker compose pull && sudo docker compose up -d"

      - name: Deploy API to Cloud Run
        run: |
          # Only update the image - env vars are managed by Pulumi
          gcloud run services update engrammic-beta-api \
            --image ${{ env.REGISTRY }}/engrammic-api:latest \
            --region ${{ env.REGION }}

      - name: Run migrations
        run: |
          gcloud run jobs execute engrammic-beta-migrate \
            --region ${{ env.REGION }} \
            --wait

      - name: Route traffic
        run: |
          gcloud run services update-traffic engrammic-beta-api \
            --region ${{ env.REGION }} \
            --to-latest
