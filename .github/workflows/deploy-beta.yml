name: Deploy Beta

on:
  push:
    branches: [beta]

env:
  REGION: europe-north1
  PROJECT_ID: engrammic

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build API image with Cloud Build
        run: |
          gcloud builds submit \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-api:${{ github.sha }} \
            --dockerfile docker/Dockerfile.api \
            --timeout 600s
          gcloud artifacts docker tags add \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-api:${{ github.sha }} \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-api:latest

      - name: Build Beacon image with Cloud Build
        run: |
          gcloud builds submit \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-beacon:${{ github.sha }} \
            --dockerfile docker/Dockerfile.beacon \
            --timeout 300s
          gcloud artifacts docker tags add \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-beacon:${{ github.sha }} \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-beacon:latest

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Pulumi
        uses: pulumi/actions@v5

      - name: Deploy infrastructure
        run: |
          cd infra
          uv sync
          uv run pulumi up --stack beta --yes
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Run database migrations
        run: |
          wget -q https://dl.google.com/cloudsql/cloud_sql_proxy.linux.amd64 -O cloud_sql_proxy
          chmod +x cloud_sql_proxy
          ./cloud_sql_proxy -instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:engrammic-beta=tcp:5432 &
          sleep 5
          uv sync
          uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql://context:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/engrammic
