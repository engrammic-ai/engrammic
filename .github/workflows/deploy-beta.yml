name: Deploy Beta

on:
  push:
    branches: [beta]
  workflow_dispatch:

env:
  REGION: europe-north1
  PROJECT_ID: engrammic

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build API image with Cloud Build
        run: |
          gcloud builds submit --config cloudbuild.api.yaml --timeout 600s \
            --substitutions SHORT_SHA=${{ env.SHORT_SHA }}

  build-beacon:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build Beacon image with Cloud Build
        run: |
          gcloud builds submit --config cloudbuild.beacon.yaml --timeout 300s \
            --substitutions SHORT_SHA=${{ env.SHORT_SHA }}

  build-dagster:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build Dagster image with Cloud Build
        run: |
          gcloud builds submit --config cloudbuild.dagster.yaml --timeout 600s \
            --substitutions SHORT_SHA=${{ env.SHORT_SHA }}

  deploy:
    needs: [build-api, build-beacon, build-dagster]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate .env from Secret Manager
        run: |
          echo "Pulling secrets from GCP Secret Manager..."
          > .env.beta
          # Fetch known secrets directly (avoids needing secrets.list permission)
          for secret_name in workos-api-key workos-client-id workos-cookie-password postgres-password memgraph-password database-url; do
            key=$(echo "$secret_name" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
            value=$(gcloud secrets versions access latest --secret="engrammic-beta-$secret_name" --project=${{ env.PROJECT_ID }} 2>/dev/null || echo "")
            if [ -n "$value" ]; then
              echo "$key=$value" >> .env.beta
            fi
          done
          # Add static config vars
          cat >> .env.beta <<EOF
          ENVIRONMENT=production
          AUTH_ENABLED=true
          POSTGRES_USER=engrammic
          POSTGRES_DATABASE=engrammic
          POSTGRES_PORT=5432
          MEMGRAPH_URI=bolt://memgraph:7687
          QDRANT_URL=http://qdrant:6333
          REDIS_URL=redis://redis:6379
          HOST=0.0.0.0
          PORT=8000
          LOG_LEVEL=INFO
          EMBEDDING_PROVIDER=vertex
          LITELLM_EMBEDDING_MODEL=vertex_ai/text-embedding-005
          EMBEDDING_DIMENSIONS=768
          LLM_PROVIDER=vertex_gemini
          DEFAULT_LLM_MODEL=gemini-2.0-flash
          VERTEX_PROJECT_ID=engrammic
          VERTEX_LOCATION=europe-north1
          CUSTODIAN__ENABLED=true
          TELEMETRY__ENABLED=true
          TELEMETRY__BEACON_URL=https://tel.engrammic.ai/v1/beacon
          EOF
          # Strip leading whitespace from each line
          sed -i 's/^[[:space:]]*//' .env.beta
          echo "Generated .env.beta with $(wc -l < .env.beta) lines"

      - name: Sync all deployment files to VM
        run: |
          # Create tarball of deployment files (including .env.beta as .env)
          cp .env.beta .env
          tar czf /tmp/deploy.tar.gz docker-compose.prod.yml dagster.yaml workspace.yaml config skills .env

          # Copy tarball to VM
          gcloud compute scp /tmp/deploy.tar.gz \
            engrammic-beta-stateful:/tmp/deploy.tar.gz \
            --zone ${{ env.REGION }}-a \
            --tunnel-through-iap

          # Extract and move into place atomically
          gcloud compute ssh engrammic-beta-stateful \
            --zone ${{ env.REGION }}-a \
            --tunnel-through-iap \
            --command "cd /tmp && \
                       sudo rm -rf deploy-staging && mkdir deploy-staging && \
                       tar xzf deploy.tar.gz -C deploy-staging && \
                       sudo rm -rf /opt/engrammic/dagster.yaml /opt/engrammic/workspace.yaml /opt/engrammic/config /opt/engrammic/skills && \
                       sudo mv deploy-staging/docker-compose.prod.yml /opt/engrammic/docker-compose.yml && \
                       sudo mv deploy-staging/dagster.yaml deploy-staging/workspace.yaml /opt/engrammic/ && \
                       sudo mv deploy-staging/config deploy-staging/skills /opt/engrammic/ && \
                       sudo mv deploy-staging/.env /opt/engrammic/.env && \
                       rm -rf deploy-staging deploy.tar.gz"

      - name: Deploy to VM (Dagster + infra)
        run: |
          gcloud compute ssh engrammic-beta-stateful \
            --zone ${{ env.REGION }}-a \
            --tunnel-through-iap \
            --command "cd /opt/engrammic && sudo docker compose down --remove-orphans && sudo docker compose pull && sudo docker compose up -d"

      - name: Wait for VM services to be healthy
        run: |
          sleep 30
          gcloud compute ssh engrammic-beta-stateful \
            --zone ${{ env.REGION }}-a \
            --tunnel-through-iap \
            --command "docker ps --format '{{.Names}}: {{.Status}}' | grep -E 'qdrant|memgraph|redis|postgres'"

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy engrammic-beta-api \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-api:latest \
            --region ${{ env.REGION }} \
            --min-instances 1 \
            --no-cpu-throttling \
            --session-affinity \
            --timeout 3600 \
            --no-traffic

      - name: Run migrations via Cloud Run Job
        run: |
          gcloud run jobs execute engrammic-beta-migrate \
            --region ${{ env.REGION }} \
            --wait

      - name: Route traffic to new revision
        run: |
          gcloud run services update-traffic engrammic-beta-api \
            --region ${{ env.REGION }} \
            --to-latest
