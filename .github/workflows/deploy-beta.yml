name: Deploy Beta

on:
  push:
    branches: [beta]
  workflow_dispatch:

env:
  REGION: europe-north1
  PROJECT_ID: engrammic

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build API image with Cloud Build
        run: |
          gcloud builds submit --config cloudbuild.api.yaml --timeout 600s \
            --substitutions SHORT_SHA=${{ env.SHORT_SHA }}

  build-beacon:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build Beacon image with Cloud Build
        run: |
          gcloud builds submit --config cloudbuild.beacon.yaml --timeout 300s \
            --substitutions SHORT_SHA=${{ env.SHORT_SHA }}

  build-dagster:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build Dagster image with Cloud Build
        run: |
          gcloud builds submit --config cloudbuild.dagster.yaml --timeout 600s \
            --substitutions SHORT_SHA=${{ env.SHORT_SHA }}

  deploy:
    needs: [build-api, build-beacon, build-dagster]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch secrets
        run: |
          echo "POSTGRES_PASSWORD=$(gcloud secrets versions access latest --secret=engrammic-beta-postgres-password)" >> $GITHUB_ENV

      - name: Generate .env on VM
        run: |
          gcloud compute ssh engrammic-beta-stateful \
            --zone ${{ env.REGION }}-a \
            --tunnel-through-iap \
            --command "cd /opt/engrammic && sudo tee .env > /dev/null << 'ENVEOF'
          POSTGRES_USER=engrammic
          POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DATABASE=engrammic
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          MEMGRAPH_URI=bolt://memgraph:7687
          QDRANT_URL=http://qdrant:6333
          REDIS_URL=redis://redis:6379
          GCP_PROJECT=engrammic
          ENVEOF"

      - name: Deploy to VM
        run: |
          gcloud compute ssh engrammic-beta-stateful \
            --zone ${{ env.REGION }}-a \
            --tunnel-through-iap \
            --command "cd /opt/engrammic && sudo docker compose pull && sudo docker compose up -d"

      - name: Wait for VM services to be healthy
        run: |
          sleep 30
          gcloud compute ssh engrammic-beta-stateful \
            --zone ${{ env.REGION }}-a \
            --tunnel-through-iap \
            --command "docker ps --format '{{.Names}}: {{.Status}}' | grep -E 'qdrant|memgraph|redis|postgres'"

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy engrammic-beta-api \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/engrammic/engrammic-api:latest \
            --region ${{ env.REGION }} \
            --min-instances 1 \
            --no-cpu-throttling \
            --session-affinity \
            --timeout 3600 \
            --no-traffic

      - name: Run migrations via Cloud Run Job
        run: |
          gcloud run jobs execute engrammic-beta-migrate \
            --region ${{ env.REGION }} \
            --wait

      - name: Route traffic to new revision
        run: |
          gcloud run services update-traffic engrammic-beta-api \
            --region ${{ env.REGION }} \
            --to-latest
