name: Build Base Images

on:
  push:
    branches: [main, beta]
    paths:
      - 'uv.lock'
      - 'pyproject.toml'
      - 'docker/Dockerfile.base-*'
  workflow_dispatch:

env:
  REGION: europe-north1
  PROJECT_ID: engrammic
  REGISTRY: europe-north1-docker.pkg.dev/engrammic/engrammic

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Build base-api via Cloud Build
        run: |
          BUILD_ID=$(gcloud builds submit \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --config docker/cloudbuild-base.yaml \
            --substitutions _REGISTRY=${{ env.REGISTRY }},_IMAGE=base-api \
            --async --format='value(id)' .)
          echo "Build ID: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID --project ${{ env.PROJECT_ID }} --region ${{ env.REGION }} --format='value(status)')
            echo "Status: $STATUS"
            case $STATUS in
              SUCCESS) exit 0 ;;
              FAILURE|TIMEOUT|CANCELLED) exit 1 ;;
            esac
            sleep 15
          done

      - name: Build base-dagster via Cloud Build
        run: |
          BUILD_ID=$(gcloud builds submit \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --config docker/cloudbuild-base.yaml \
            --substitutions _REGISTRY=${{ env.REGISTRY }},_IMAGE=base-dagster \
            --async --format='value(id)' .)
          echo "Build ID: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID --project ${{ env.PROJECT_ID }} --region ${{ env.REGION }} --format='value(status)')
            echo "Status: $STATUS"
            case $STATUS in
              SUCCESS) exit 0 ;;
              FAILURE|TIMEOUT|CANCELLED) exit 1 ;;
            esac
            sleep 15
          done

      - name: Build base-selfhosted via Cloud Build
        run: |
          BUILD_ID=$(gcloud builds submit \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --config docker/cloudbuild-base.yaml \
            --substitutions _REGISTRY=${{ env.REGISTRY }},_IMAGE=base-selfhosted \
            --async --format='value(id)' .)
          echo "Build ID: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID --project ${{ env.PROJECT_ID }} --region ${{ env.REGION }} --format='value(status)')
            echo "Status: $STATUS"
            case $STATUS in
              SUCCESS) exit 0 ;;
              FAILURE|TIMEOUT|CANCELLED) exit 1 ;;
            esac
            sleep 15
          done

      - name: Build base-selfhosted-dagster via Cloud Build
        run: |
          BUILD_ID=$(gcloud builds submit \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --config docker/cloudbuild-base.yaml \
            --substitutions _REGISTRY=${{ env.REGISTRY }},_IMAGE=base-selfhosted-dagster \
            --async --format='value(id)' .)
          echo "Build ID: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID --project ${{ env.PROJECT_ID }} --region ${{ env.REGION }} --format='value(status)')
            echo "Status: $STATUS"
            case $STATUS in
              SUCCESS) exit 0 ;;
              FAILURE|TIMEOUT|CANCELLED) exit 1 ;;
            esac
            sleep 15
          done
