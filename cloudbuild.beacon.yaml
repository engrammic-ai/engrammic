steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/Dockerfile.beacon'
      - '-t'
      - '${_IMAGE}:latest'
      - '-t'
      - '${_IMAGE}:${SHORT_SHA}'
      - '.'

images:
  - '${_IMAGE}:latest'
  - '${_IMAGE}:${SHORT_SHA}'

substitutions:
  _IMAGE: 'europe-north1-docker.pkg.dev/engrammic/engrammic/engrammic-beacon'

options:
  logging: CLOUD_LOGGING_ONLY
