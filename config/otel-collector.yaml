receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # SigNoz backend (or any OTLP-compatible backend)
  # Configure via SIGNOZ_ENDPOINT env var, defaults to signoz-otel-collector:4317
  otlp/signoz:
    endpoint: ${SIGNOZ_ENDPOINT:-signoz-otel-collector:4317}
    tls:
      insecure: true
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/signoz, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/signoz, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/signoz, debug]
