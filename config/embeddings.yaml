# Embedding service configuration
provider: litellm
model: vertex_ai/gemini-embedding-001
# gemini-embedding-001 supports Matryoshka: 768, 1536, 2048, 3072
# Using 2048 for better retrieval quality (MTEB 68.3 vs 63.0 for text-embedding-005)
# IMPORTANT: Changing dimensions requires recreating Qdrant collections and re-embedding.
dimensions: 2048
model_version: gemini-embedding-001

# Sparse encoder for hybrid search (BM25 via FastEmbed, no torch required)
sparse:
  enabled: true
  provider: fastembed
  model: Qdrant/bm25

# Qdrant collection name (tests use context_vectors_test)
qdrant_collection: context_vectors

# Rate limiting for Vertex AI API
# Vertex AI text-embedding-005 limits:
#   - 1500 QPM (queries per minute) per project
#   - 250 requests per minute per region
rate_limit:
  max_retries: 3
  retry_base_delay_seconds: 1.0
  retry_max_delay_seconds: 60.0
  max_concurrent_requests: 5      # conservative for dev-box
  timeout_seconds: 60.0
  requests_per_minute: 100        # conservative for dev-box (prod: 250)

# Batching config
batching:
  enabled: true
  mode: count  # "count" (Phase 1) or "token_budget" (Phase 2)
  # Count mode settings (Phase 1)
  batch_size: 32
  timeout_ms: 100
  small_batch_threshold: 4
  # Token budget mode settings (Phase 2)
  token_budget: 8000
  max_batch_size: 64
