# Embedding service configuration
provider: litellm
model: vertex_ai/text-embedding-005
# IMPORTANT: Switching to Matryoshka 512-dim (Phase 1 of recall optimization)
# requires changing dimensions to 512 AND recreating all Qdrant collections with
# size=512 AND re-embedding all existing documents. See:
# context/specs/2026-05-19-recall-optimization.md
dimensions: 768
model_version: text-embedding-005

# Qdrant collection name (tests use context_vectors_test)
qdrant_collection: context_vectors

# Rate limiting for Vertex AI API
# Vertex AI text-embedding-005 limits:
#   - 1500 QPM (queries per minute) per project
#   - 250 requests per minute per region
rate_limit:
  max_retries: 3
  retry_base_delay_seconds: 1.0
  retry_max_delay_seconds: 60.0
  max_concurrent_requests: 5      # conservative for dev-box
  timeout_seconds: 60.0
  requests_per_minute: 100        # conservative for dev-box (prod: 250)
