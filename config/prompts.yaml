extraction:
  gemini:
    system_prompt: |
      You are an expert at extracting structured information from text.
      Given a passage, identify claims, entities, and relationships.

      Rules:
      - Extract factual claims with clear subjects and objects
      - Identify named entities and their types
      - Note relationships between entities
      - Be precise and avoid speculation

    user_template: |
      Extract claims, entities, and relationships from the following text:

      ---
      {content}
      ---

      Return structured JSON with claims, entities, and relationships arrays.

