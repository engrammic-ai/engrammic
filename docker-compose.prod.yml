services:
  app:
    build:
      context: ..
      dockerfile: context-service/Dockerfile
    container_name: context-service-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=context
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=context_service
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gcp-sa.json
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=context-service
    volumes:
      - ./secrets:/app/secrets:ro
      - ./config:/app/config:ro
    depends_on:
      memgraph:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph-mage:2.18
    container_name: context-service-memgraph
    ports:
      - "7687:7687"
    volumes:
      - memgraph-data:/var/lib/memgraph
      - memgraph-log:/var/log/memgraph
    environment:
      - MEMGRAPH_USER=${MEMGRAPH_USER}
      - MEMGRAPH_PASSWORD=${MEMGRAPH_PASSWORD}
    command: ["--log-level=WARNING", "--storage-properties-on-edges=true"]
    healthcheck:
      test: ["CMD", "echo", ">", "/dev/tcp/localhost/7687"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: context-service-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: context-service-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: context-service-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=context
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=context_service
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U context -d context_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  dagster-code-server:
    build:
      context: ..
      dockerfile: context-service/Dockerfile.dagster
    container_name: context-service-dagster-code
    command: ["dagster", "api", "grpc", "-h", "0.0.0.0", "-p", "4000", "-m", "context_service.pipelines.definitions"]
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/app
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=context
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=context_service
    volumes:
      - ./dagster.yaml:/app/dagster.yaml:ro
      - ./config:/app/config:ro
    depends_on:
      - postgres
      - memgraph
      - qdrant
      - redis
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "dagster", "api", "grpc-health-check", "-p", "4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dagster-webserver:
    build:
      context: ..
      dockerfile: context-service/Dockerfile.dagster
    container_name: context-service-dagster-web
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "workspace.yaml"]
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/app
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=context
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=context_service
    volumes:
      - ./workspace.yaml:/app/workspace.yaml:ro
      - ./dagster.yaml:/app/dagster.yaml:ro
      - ./config:/app/config:ro
    depends_on:
      dagster-code-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  dagster-daemon:
    build:
      context: ..
      dockerfile: context-service/Dockerfile.dagster
    container_name: context-service-dagster-daemon
    command: ["dagster-daemon", "run"]
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/app
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=context
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=context_service
    volumes:
      - ./workspace.yaml:/app/workspace.yaml:ro
      - ./dagster.yaml:/app/dagster.yaml:ro
      - ./config:/app/config:ro
    depends_on:
      dagster-code-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      memgraph:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: context-service-otel
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      # Point to SigNoz on strata-finance or external host
      - SIGNOZ_ENDPOINT=${SIGNOZ_ENDPOINT:-signoz-otel-collector:4317}
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    # Note: SigNoz deployed separately on strata-finance box

volumes:
  memgraph-data:
  memgraph-log:
  qdrant-data:
  redis-data:
  postgres-data:
