services:
  app:
    image: europe-north1-docker.pkg.dev/engrammic/engrammic/engrammic-api:latest
    container_name: engrammic-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    volumes:
      - ~/.config/gcloud:/mnt/gcloud:ro
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
    depends_on:
      memgraph:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph-mage:3.10.1
    container_name: engrammic-memgraph
    ports:
      - "7687:7687"
    volumes:
      - memgraph-data:/var/lib/memgraph
      - memgraph-log:/var/log/memgraph
    environment:
      - MEMGRAPH_USER=${MEMGRAPH_USER}
      - MEMGRAPH_PASSWORD=${MEMGRAPH_PASSWORD}
    command: ["--log-level=WARNING", "--storage-properties-on-edges=true"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('localhost',7687)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: engrammic-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: engrammic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: engrammic-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  dagster-code-server:
    image: europe-north1-docker.pkg.dev/engrammic/engrammic/engrammic-dagster:latest
    container_name: engrammic-dagster-code
    command: ["dagster", "api", "grpc", "-h", "0.0.0.0", "-p", "4000", "-m", "context_service.pipelines.definitions"]
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/app
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    volumes:
      - ./dagster.yaml:/app/dagster.yaml:ro
      - ./config:/app/config:ro
    depends_on:
      - postgres
      - memgraph
      - qdrant
      - redis
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "dagster", "api", "grpc-health-check", "-p", "4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dagster-webserver:
    image: europe-north1-docker.pkg.dev/engrammic/engrammic/engrammic-dagster:latest
    container_name: engrammic-dagster-web
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "workspace.yaml"]
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/app
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    volumes:
      - ./workspace.yaml:/app/workspace.yaml:ro
      - ./dagster.yaml:/app/dagster.yaml:ro
      - ./config:/app/config:ro
    depends_on:
      dagster-code-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  dagster-daemon:
    image: europe-north1-docker.pkg.dev/engrammic/engrammic/engrammic-dagster:latest
    container_name: engrammic-dagster-daemon
    command: ["dagster-daemon", "run"]
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/app
      - MEMGRAPH_HOST=memgraph
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    volumes:
      - ./workspace.yaml:/app/workspace.yaml:ro
      - ./dagster.yaml:/app/dagster.yaml:ro
      - ./config:/app/config:ro
    depends_on:
      dagster-code-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      memgraph:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

volumes:
  memgraph-data:
  memgraph-log:
  qdrant-data:
  redis-data:
  postgres-data:
