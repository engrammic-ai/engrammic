steps:
  # Pull existing image for cache (ignore failure if not exists)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_IMAGE}:latest || true']

  # Build with BuildKit and cache-from
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '--cache-from=${_IMAGE}:latest'
      - '-f'
      - 'Dockerfile.partners'
      - '-t'
      - '${_IMAGE}:latest'
      - '-t'
      - '${_IMAGE}:${SHORT_SHA}'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

images:
  - '${_IMAGE}:latest'
  - '${_IMAGE}:${SHORT_SHA}'

substitutions:
  _IMAGE: 'europe-north1-docker.pkg.dev/engrammic/engrammic/engrammic-partners'

options:
  logging: CLOUD_LOGGING_ONLY

serviceAccount: 'projects/engrammic/serviceAccounts/cloudbuild-dev@engrammic.iam.gserviceaccount.com'
